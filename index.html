<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentation Scroll</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: #F2EFE2;
    }

    .slider {
      width: 100%;
      height: 100vh;
    }

    .slide {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #F2EFE2;
    }

    .slide img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <main class="slider">
    <section class="slide"><img src="./photo1.jpeg" alt="Страница 1"></section>
    <section class="slide"><img src="./photo2.jpeg" alt="Страница 2"></section>
    <section class="slide"><img src="./photo3.jpeg" alt="Страница 3"></section>
    <section class="slide"><img src="./photo4.jpeg" alt="Страница 4"></section>
    <section class="slide"><img src="./photo5.jpeg" alt="Страница 5"></section>
    <section class="slide"><img src="./photo6.jpeg" alt="Страница 6"></section>
  </main>

  <script>
    const slides = document.querySelectorAll('.slide');
    let current = 0;
    let locked = false;
    let touchStartY = 0;

    function goToSlide(index) {
      if (index < 0 || index >= slides.length) return;
      locked = true;
      current = index;
      slides[current].scrollIntoView({ behavior: 'smooth' });
      setTimeout(() => locked = false, 900);
    }

    window.addEventListener('wheel', (e) => {
      if (locked) return;
      if (e.deltaY > 30) goToSlide(current + 1);
      if (e.deltaY < -30) goToSlide(current - 1);
    }, { passive: true });

    window.addEventListener('keydown', (e) => {
      if (locked) return;

      if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
        e.preventDefault();
        goToSlide(current + 1);
      }

      if (e.key === 'ArrowUp' || e.key === 'PageUp') {
        e.preventDefault();
        goToSlide(current - 1);
      }
    });

    window.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchend', (e) => {
      if (locked) return;
      const touchEndY = e.changedTouches[0].clientY;
      const diff = touchStartY - touchEndY;

      if (diff > 50) goToSlide(current + 1);
      if (diff < -50) goToSlide(current - 1);
    }, { passive: true });
  </script>
</body>
</html>
