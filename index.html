<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мой сайт</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: #000;
    }

    body {
      overflow-x: hidden;
    }

    .page-image {
      display: block;
      width: 100%;
      height: auto;
      max-width: 100%;
    }
  </style>
</head>
<body>
  <img src="./photo.jpg" alt="Длинное изображение сайта" class="page-image" />
</body>
</html>
