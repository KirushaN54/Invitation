<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой сайт</title>
  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: #F2EFE2;
    }

    .section {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      scroll-snap-align: start;
    }

    .section img {
      display: block;
      width: 800px;
      max-width: 100%;
      height: auto;
    }

    .scroll-wrap {
      scroll-snap-type: y proximity;
    }
  </style>
</head>
<body>
  <main class="scroll-wrap">
    <section class="section">
      <img src="./photo1.jpg" alt="Страница 1">
    </section>
    <section class="section">
      <img src="./photo2.jpg" alt="Страница 2">
    </section>
    <section class="section">
      <img src="./photo3.jpg" alt="Страница 3">
    </section>
    <section class="section">
      <img src="./photo4.jpg" alt="Страница 3">
    </section>
    <section class="section">
      <img src="./photo5.jpg" alt="Страница 3">
    </section>
    <section class="section">
      <img src="./photo6.jpg" alt="Страница 3">
    </section>
  </main>
</body>
</html>
