<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Wedding Invitation</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #F2EFE2;
      --olive: #8a9850;
      --olive-dark: #6f7d3f;
      --text: #161616;
      --paper: rgba(242, 239, 226, 0.72);
      --paper-strong: rgba(242, 239, 226, 0.9);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.16);
      --radius: 24px;
      --desktop-width: 920px;
      --transition: 700ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, serif;
    }

    body {
      position: relative;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .deck {
      position: relative;
      width: 100%;
      height: 100dvh;
      background:
        radial-gradient(circle at top, rgba(138, 152, 80, 0.08), transparent 35%),
        linear-gradient(180deg, #f6f3e7 0%, #efe9d8 100%);
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      opacity: 0;
      transform: translateY(8%) scale(0.985);
      pointer-events: none;
      transition:
        opacity var(--transition),
        transform var(--transition),
        filter var(--transition);
      filter: blur(10px);
      z-index: 1;
    }

    .slide.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
      pointer-events: auto;
      z-index: 3;
    }

    .slide.prev {
      opacity: 0;
      transform: translateY(-7%) scale(0.985);
      filter: blur(10px);
      z-index: 2;
    }

    .slide.next {
      opacity: 0;
      transform: translateY(10%) scale(0.985);
      filter: blur(10px);
      z-index: 2;
    }

    .frame {
      position: relative;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* HUD */

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    .counter {
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      right: 14px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(242, 239, 226, 0.82);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4e5731;
      pointer-events: auto;
    }

    .dots {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: auto;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1.5px solid rgba(111, 125, 63, 0.55);
      background: rgba(242, 239, 226, 0.55);
      cursor: pointer;
      transition: transform 220ms ease, background 220ms ease, border-color 220ms ease;
    }

    .dot.active {
      background: var(--olive);
      border-color: var(--olive);
      transform: scale(1.2);
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: calc(14px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(242, 239, 226, 0.82);
      color: #4f5c2f;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      font-size: 13px;
      letter-spacing: 0.03em;
      pointer-events: auto;
      transition: opacity 220ms ease;
    }

    .hint .mouse {
      width: 16px;
      height: 24px;
      border: 1.5px solid currentColor;
      border-radius: 999px;
      position: relative;
      opacity: 0.75;
    }

    .hint .mouse::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 4px;
      width: 3px;
      height: 5px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: currentColor;
      animation: wheel 1.7s ease-in-out infinite;
    }

    @keyframes wheel {
      0% { opacity: 0; transform: translateX(-50%) translateY(0); }
      30% { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(8px); }
    }

    /* Кнопка Яндекс Карт: центр снизу */

    .map-link {
      position: absolute;
      left: 50%;
      bottom: calc(32px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 52px;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      color: #2f3818;
      background: rgba(242, 239, 226, 0.92);
      border: 1px solid rgba(138, 152, 80, 0.32);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.14);
      backdrop-filter: blur(10px);
      z-index: 8;
      transition: transform 220ms ease, box-shadow 220ms ease, background 220ms ease;
    }

    .map-link:hover,
    .map-link:focus-visible {
      transform: translateX(-50%) translateY(-2px);
      box-shadow: 0 20px 44px rgba(0, 0, 0, 0.18);
      background: var(--paper-strong);
      outline: none;
    }

    .map-icon {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #9daa61 0%, #7a8941 100%);
      color: #fffef7;
      flex: 0 0 auto;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
    }

    .map-text {
      display: flex;
      flex-direction: column;
      line-height: 1.05;
      white-space: nowrap;
    }

    .map-text strong {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .map-text span {
      font-size: 11px;
      color: rgba(47, 56, 24, 0.72);
      margin-top: 3px;
    }

    /* Мобильная рамка-карточка и уменьшенная плашка */

    @media (max-width: 768px) {
      .slide {
        padding: 18px 14px;
      }

      .frame {
        width: 100%;
        max-width: 420px;
        height: auto;
        max-height: 100dvh;
        margin: 0 auto;
        border-radius: 24px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .slide img {
        width: 100%;
        height: auto;
        max-height: 100dvh;
        object-fit: cover;
      }

      .map-link {
        bottom: calc(20px + env(safe-area-inset-bottom));
        padding: 9px 12px;
        min-height: 44px;
        gap: 6px;
      }

      .map-icon {
        width: 26px;
        height: 26px;
      }

      .map-text strong {
        font-size: 12px;
      }

      .map-text span {
        font-size: 10px;
      }

      .counter { font-size: 12px; }
    }

    /* Десктопная рамка и ограничение ширины */

    @media (min-width: 900px) {
      .slide {
        padding: 28px 24px;
      }

      .frame {
        width: min(var(--desktop-width), 100%);
        height: calc(100dvh - 56px);
        max-height: 100%;
        border-radius: 30px;
        box-shadow: var(--shadow);
      }

      .slide img {
        object-fit: contain;
        background: var(--bg);
      }

      .counter {
        top: 24px;
        right: 24px;
      }

      .dots {
        right: 24px;
      }

      .hint {
        bottom: 24px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .slide,
      .dot,
      .map-link,
      .hint .mouse::after {
        transition: none !important;
        animation: none !important;
      }
    }

    /* Canvas фейерверка на первом слайде */

    .fireworks-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      mix-blend-mode: screen;
    }
  </style>
</head>
<body>
  <div class="deck" id="deck">
    <section class="slide active" data-index="0">
      <div class="frame">
        <img src="./photo1.jpeg" alt="Слайд 1 приглашения" />
        <canvas class="fireworks-layer" id="fireworksCanvas"></canvas>
      </div>
    </section>
    <section class="slide next" data-index="1">
      <div class="frame"><img src="./photo2.jpeg" alt="Слайд 2 приглашения" /></div>
    </section>
    <section class="slide next" data-index="2">
      <div class="frame">
        <img src="./photo3.jpeg" alt="Слайд 3 приглашения с местом проведения" />
        <a class="map-link"
           href="https://yandex.ru/maps/-/CPWAyO1~"
           target="_blank"
           rel="noopener noreferrer"
           aria-label="Открыть в Яндекс Картах">
          <span class="map-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 21s6-5.4 6-11a6 6 0 1 0-12 0c0 5.6 6 11 6 11Z" fill="currentColor"/>
              <circle cx="12" cy="10" r="2.6" fill="#7a8941"/>
            </svg>
          </span>
          <span class="map-text">
            <strong>Открыть в Яндекс Картах</strong>
            <span>Маршрут до площадки</span>
          </span>
        </a>
      </div>
    </section>
    <section class="slide next" data-index="3">
      <div class="frame"><img src="./photo4.jpeg" alt="Слайд 4 приглашения" /></div>
    </section>
    <section class="slide next" data-index="4">
      <div class="frame"><img src="./photo5.jpeg" alt="Слайд 5 приглашения" /></div>
    </section>
    <section class="slide next" data-index="5">
      <div class="frame"><img src="./photo6.jpeg" alt="Слайд 6 приглашения" /></div>
    </section>
  </div>

  <div class="hud" aria-hidden="false">
    <div class="counter" id="counter">1 / 6</div>
    <div class="dots" id="dots">
      <button class="dot active" type="button" aria-label="Перейти к слайду 1"></button>
      <button class="dot" type="button" aria-label="Перейти к слайду 2"></button>
      <button class="dot" type="button" aria-label="Перейти к слайду 3"></button>
      <button class="dot" type="button" aria-label="Перейти к слайду 4"></button>
      <button class="dot" type="button" aria-label="Перейти к слайду 5"></button>
      <button class="dot" type="button" aria-label="Перейти к слайду 6"></button>
    </div>
    <div class="hint" id="hint">
      <span class="mouse" aria-hidden="true"></span>
      <span>Листайте вниз</span>
    </div>
  </div>

  <script>
    const slides = Array.from(document.querySelectorAll('.slide'));
    const dots = Array.from(document.querySelectorAll('.dot'));
    const counter = document.getElementById('counter');
    const hint = document.getElementById('hint');
    let current = 0;
    let locked = false;
    let touchStartY = 0;
    let unlockTimer;

    function paintSlides() {
      slides.forEach((slide, index) => {
        slide.classList.remove('active', 'prev', 'next');
        if (index === current) slide.classList.add('active');
        else if (index < current) slide.classList.add('prev');
        else slide.classList.add('next');
      });

      dots.forEach((dot, index) => {
        dot.classList.toggle('active', index === current);
      });

      counter.textContent = `${current + 1} / ${slides.length}`;

      if (current === 0) {
        hint.style.opacity = '1';
        scheduleFireworks();
      } else {
        hint.style.opacity = '0';
      }
    }

    function unlockLater() {
      window.clearTimeout(unlockTimer);
      unlockTimer = window.setTimeout(() => {
        locked = false;
      }, 760);
    }

    function goToSlide(index) {
      if (locked || index < 0 || index >= slides.length || index === current) return;
      locked = true;
      current = index;
      paintSlides();
      unlockLater();
    }

    window.addEventListener('wheel', (e) => {
      if (locked) return;
      if (Math.abs(e.deltaY) < 18) return;
      if (e.deltaY > 0) goToSlide(current + 1);
      else goToSlide(current - 1);
    }, { passive: true });

    window.addEventListener('keydown', (e) => {
      if (locked) return;
      if (['ArrowDown', 'PageDown', ' '].includes(e.key)) {
        e.preventDefault();
        goToSlide(current + 1);
      }
      if (['ArrowUp', 'PageUp'].includes(e.key)) {
        e.preventDefault();
        goToSlide(current - 1);
      }
      if (e.key === 'Home') {
        e.preventDefault();
        goToSlide(0);
      }
      if (e.key === 'End') {
        e.preventDefault();
        goToSlide(slides.length - 1);
      }
    });

    window.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchend', (e) => {
      if (locked) return;
      const touchEndY = e.changedTouches[0].clientY;
      const diff = touchStartY - touchEndY;
      if (Math.abs(diff) < 45) return;
      if (diff > 0) goToSlide(current + 1);
      else goToSlide(current - 1);
    }, { passive: true });

    dots.forEach((dot, index) => {
      dot.addEventListener('click', () => goToSlide(index));
    });

    /* ФЕЙЕРВЕРК: более плотный, розово‑фиолетовый, с задержкой */

    const fwCanvas = document.getElementById('fireworksCanvas');
    const fwCtx = fwCanvas.getContext('2d');
    let fwParticles = [];
    let fwActive = false;
    let fwStartedOnce = false;

    function resizeFireworks() {
      if (!fwCanvas) return;
      const rect = fwCanvas.getBoundingClientRect();
      fwCanvas.width = rect.width * window.devicePixelRatio;
      fwCanvas.height = rect.height * window.devicePixelRatio;
      fwCtx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    }

    function createFireworkBurst(offsetX = 0) {
      const rect = fwCanvas.getBoundingClientRect();
      const cx = rect.width / 2 + offsetX + (Math.random() * 60 - 30);
      const cy = rect.height * (0.25 + Math.random() * 0.2);
      const colors = [
        '#ff9ad5', '#ff7ac4', '#f76df2',
        '#e45dff', '#c257ff', '#a94bff',
        '#ffd0f0', '#ffe1ff'
      ];

      const count = 90;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + (Math.random() * 0.3 - 0.15);
        const speed = 1.6 + Math.random() * 1.9;
        fwParticles.push({
          x: cx,
          y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 0,
          maxLife: 55 + Math.random() * 25,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
    }

    function stepFireworks() {
      if (!fwActive) return;
      fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);

      fwParticles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.03;
        p.life++;

        const fade = p.life / p.maxLife;
        const alpha = Math.max(0, 1 - fade);
        const size = 2.5 - fade * 1.2;

        fwCtx.globalAlpha = alpha;
        fwCtx.beginPath();
        fwCtx.arc(p.x, p.y, size, 0, Math.PI * 2);
        fwCtx.fillStyle = p.color;
        fwCtx.fill();
      });

      fwParticles = fwParticles.filter(p => p.life < p.maxLife);
      fwCtx.globalAlpha = 1;

      if (fwActive || fwParticles.length > 0) {
        requestAnimationFrame(stepFireworks);
      } else {
        fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
      }
    }

    function runFireworksSequence() {
      fwActive = true;
      fwParticles = [];

      resizeFireworks();

      createFireworkBurst(-60);
      setTimeout(() => createFireworkBurst(40), 350);
      setTimeout(() => createFireworkBurst(0), 700);
      setTimeout(() => createFireworkBurst(-30), 1050);
      setTimeout(() => createFireworkBurst(70), 1400);

      setTimeout(() => { fwActive = false; }, 4200);

      requestAnimationFrame(stepFireworks);
    }

    function scheduleFireworks() {
      if (!fwCanvas || fwStartedOnce) return;
      fwStartedOnce = true;

      setTimeout(() => {
        if (current === 0) {
          runFireworksSequence();
        }
      }, 1200);
    }

    window.addEventListener('resize', resizeFireworks);
    window.addEventListener('load', resizeFireworks);

    paintSlides();
  </script>
</body>
</html>
