<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Пригласительное</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #F2EFE2;
    }

    body {
      overflow-x: hidden;
      font-family: Arial, sans-serif;
    }

    .page {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .site-frame {
      width: 100%;
      max-width: 760px;
      background: #000;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.35);
    }

    .site-image {
      display: block;
      width: 100%;
      height: auto;
    }

    @media (max-width: 768px) {
      .site-frame {
        max-width: 100%;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="site-frame">
      <img src="./photo1.jpg" alt="Длинное изображение сайта" class="site-image">
    </div>
  </main>
</body>
</html>
